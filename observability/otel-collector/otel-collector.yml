# Single collector config shared by every service/worker. Services only need to
# point OTEL_EXPORTER_OTLP_ENDPOINT at this collector — nothing here changes when
# you add a new service.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
  # Postgres server-side metrics (commits, rollbacks, backends, db size, ...).
  # Connects over the compose network on the internal port 5432.
  postgresql:
    endpoint: dots-beacon-dev-db:5432
    username: ${env:POSTGRES_USER}
    password: ${env:POSTGRES_PASSWORD}
    databases:
      - ${env:POSTGRES_DB}
    collection_interval: 10s
    tls:
      insecure: true

processors:
  # Guard against unbounded memory use under load.
  memory_limiter:
    check_interval: 1s
    limit_percentage: 80
    spike_limit_percentage: 25
  # Tag telemetry with where the collector runs.
  resource_detection:
    detectors: [env, system]
    timeout: 2s
  batch: {}

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

exporters:
  # Traces -> Tempo (OTLP/gRPC).
  otlp_grpc/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true
  # Metrics -> exposed for Prometheus to scrape.
  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: dots_beacon
    resource_to_telemetry_conversion:
      enabled: true
  # Logs -> Loki native OTLP endpoint (lokiexporter is deprecated).
  otlp_http/loki:
    endpoint: http://loki:3100/otlp
  debug:
    verbosity: basic

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource_detection, batch]
      exporters: [otlp_grpc/tempo, debug]
    metrics:
      receivers: [otlp, postgresql]
      processors: [memory_limiter, resource_detection, batch]
      exporters: [prometheus, debug]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, resource_detection, batch]
      exporters: [otlp_http/loki, debug]
  telemetry:
    metrics:
      level: detailed
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888
