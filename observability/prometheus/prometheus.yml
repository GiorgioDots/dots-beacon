global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Application/worker metrics, funnelled through the collector's prometheus
  # exporter. New services flow through here automatically — no new target.
  - job_name: 'otel-collector-apps'
    scrape_interval: 5s
    static_configs:
      - targets: ['otel-collector:8889']

  # The collector's own internal telemetry.
  - job_name: 'otel-collector-self'
    scrape_interval: 15s
    static_configs:
      - targets: ['otel-collector:8888']
