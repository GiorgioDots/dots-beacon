# Single-binary Loki. Chunks + index persist to MinIO (S3); /loki holds only
# ephemeral working state. Requires -config.expand-env=true for env substitution.
auth_enabled: false

server:
  http_listen_port: 3100

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    s3:
      endpoint: minio:9000
      bucketnames: ${LOKI_S3_BUCKET}
      access_key_id: ${MINIO_ROOT_USER}
      secret_access_key: ${MINIO_ROOT_PASSWORD}
      s3forcepathstyle: true   # required for MinIO
      insecure: true           # http on the compose network
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2020-10-24
      store: tsdb
      object_store: s3
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  # Required for OTLP ingestion (Loki stores OTel attributes as structured metadata).
  allow_structured_metadata: true
  volume_enabled: true
