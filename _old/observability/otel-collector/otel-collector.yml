# Single collector config shared by every service/worker. Services only need to
# point OTEL_EXPORTER_OTLP_ENDPOINT at this collector — nothing here changes when
# you add a new service.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
  # Postgres server-side metrics (commits, rollbacks, backends, db size, ...).
  # Connects over the compose network on the internal port 5432.
  postgresql:
    endpoint: dots-beacon-dev-db:5432
    username: ${env:POSTGRES_USER}
    password: ${env:POSTGRES_PASSWORD}
    databases:
      - ${env:POSTGRES_DB}
    collection_interval: 10s
    tls:
      insecure: true
  # Scrape the collector's own internal telemetry (exposed on :8888 below) so it
  # is remote-written to Mimir alongside everything else.
  prometheus/collector:
    config:
      scrape_configs:
        - job_name: otel-collector-self
          scrape_interval: 15s
          static_configs:
            - targets: ['127.0.0.1:8888']

processors:
  # Guard against unbounded memory use under load.
  memory_limiter:
    check_interval: 1s
    limit_percentage: 80
    spike_limit_percentage: 25
  # Tag telemetry with where the collector runs.
  resource_detection:
    detectors: [env, system]
    timeout: 2s
  batch: {}

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

exporters:
  # Traces -> Tempo (OTLP/gRPC).
  otlp_grpc/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true
  # Metrics -> remote-written to Mimir (which persists them to MinIO/S3).
  prometheusremotewrite/mimir:
    endpoint: http://mimir:9009/api/v1/push
    namespace: dots_beacon
    resource_to_telemetry_conversion:
      enabled: true
  # Logs -> Loki native OTLP endpoint (lokiexporter is deprecated).
  otlp_http/loki:
    endpoint: http://loki:3100/otlp
  debug:
    verbosity: basic

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource_detection, batch]
      exporters: [otlp_grpc/tempo, debug]
    metrics:
      receivers: [otlp, postgresql, prometheus/collector]
      processors: [memory_limiter, resource_detection, batch]
      exporters: [prometheusremotewrite/mimir, debug]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, resource_detection, batch]
      exporters: [otlp_http/loki, debug]
  telemetry:
    metrics:
      level: detailed
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888
