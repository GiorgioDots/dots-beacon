# Minimal single-binary Tempo. Blocks persist to MinIO (S3); WAL stays on the
# local volume. Requires -config.expand-env=true for the env substitutions below.
server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  # Dev: cut blocks quickly so traces persist to S3 and become queryable from
  # the backend fast. Raise this (e.g. 5m) in prod to avoid many tiny blocks.
  max_block_duration: 30s

compactor:
  compaction:
    block_retention: 48h

storage:
  trace:
    backend: s3
    s3:
      bucket: ${TEMPO_S3_BUCKET}
      endpoint: minio:9000
      access_key: ${MINIO_ROOT_USER}
      secret_key: ${MINIO_ROOT_PASSWORD}
      insecure: true          # MinIO over http on the compose network
      forcepathstyle: true    # required for MinIO
    wal:
      path: /var/tempo/wal
