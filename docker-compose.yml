services:
  dots-beacon-dev-db:
    image: "postgres:18"
    ports:
      - 5433:5432
    env_file:
      .env.local
    volumes:
      - ./data/db/:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 2s
      timeout: 3s
      retries: 15

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.153.0@sha256:93aad750175cbf1a973ae1c5886c3371f4d800f61be25cdd26870b8441ffe9fa
    command: ["--config=/etc/otel-collector.yml"]
    env_file:
      .env.local   # POSTGRES_* for the postgresql receiver
    volumes:
      - ./observability/otel-collector/otel-collector.yml:/etc/otel-collector.yml
    ports:
      - 4317:4317   # OTLP gRPC (services export here)
      - 4318:4318   # OTLP HTTP
    depends_on:
      tempo:
        condition: service_started
      loki:
        condition: service_started
      dots-beacon-dev-db:
        condition: service_healthy

  tempo:
    image: grafana/tempo:2.9.0
    command: ["-config.file=/etc/tempo.yml"]
    volumes:
      - ./observability/tempo/tempo.yml:/etc/tempo.yml
      - tempo-data:/var/tempo
    ports:
      - 3200:3200   # Tempo API/UI query

  loki:
    image: grafana/loki:3.5.0
    command: ["-config.file=/etc/loki/loki.yml"]
    volumes:
      - ./observability/loki/loki.yml:/etc/loki/loki.yml
      - loki-data:/loki
    ports:
      - 3100:3100

  prometheus:
    image: prom/prometheus:v3.12.0@sha256:69f5241418838263316593f7274a304b095c40bcf22e57272865da91bd60a8ac
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - 9090:9090

  grafana:
    image: grafana/grafana:12.2.0
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    ports:
      - 3000:3000
    depends_on:
      - prometheus
      - tempo
      - loki

volumes:
  tempo-data:
  loki-data:
  grafana-data:
