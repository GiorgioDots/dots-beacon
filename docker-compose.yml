services:
  dots-beacon-dev-db:
    image: "postgres:18"
    ports: 
      - 5433:5432
    env_file:
      .env.local
    volumes:
      - ./data/db/:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 2s
      timeout: 3s
      retries: 15

