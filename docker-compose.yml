services:
  dots-beacon-dev-db:
    image: "postgres:18"
    ports: 
      - 5433:5432
    env_file:
      .env.local
    volumes:
      - ./data/db/:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 2s
      timeout: 3s
      retries: 15

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.153.0@sha256:93aad750175cbf1a973ae1c5886c3371f4d800f61be25cdd26870b8441ffe9fa
    command: ["--config=/etc/otel-collector.yml"]
    volumes:
      - ./observability/otel-collector/otel-collector.yml:/etc/otel-collector.yml
    ports:
      - 4317:4317

  prometheus:
    image: prom/prometheus:v3.12.0@sha256:69f5241418838263316593f7274a304b095c40bcf22e57272865da91bd60a8ac
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - 9090:9090

  jaeger:
    image: jaegertracing/all-in-one:1.60@sha256:4fd2d70fa347d6a47e79fcb06b1c177e6079f92cba88b083153d56263082135e
    ports:
      - 16686:16686

