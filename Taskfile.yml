# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

interval: 500ms
dotenv:
  - .env.local
  - .env.{{.ENV}}
  - .env

tasks:
  default:
    desc: Tasks guide
    cmds:
      - "echo \"Available commands: \n  - task dev-api: start api dev server;\""
    silent: true

  migrate-up:
    deps:
      - dev-compose
    cmds:
      - migrate -path internal/database/migrations -database {{.DATABASE_URL}} up

  migrate-down:
    deps:
      - dev-compose
    cmds:
      - migrate -path internal/database/migrations -database {{.DATABASE_URL}} down

  dev-compose:
    desc: Run docker compose locally
    cmds:
      # --env-file so compose interpolates ${...} (MinIO/Postgres creds) from .env.local
      - docker compose --env-file .env.local up -d --wait

  dev-api:
    desc: Run api dev server
    watch: true
    dir: "apps/api"
    sources:
      - "**/*.go"
    cmds:
      - "go build -o ./tmp/main ./cmd/api"
      - "./tmp/main"
  
  dev-web:
    desc: Run web app dev server
    dir: "apps/web"
    cmds:
      - "pnpm run dev"